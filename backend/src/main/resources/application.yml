spring:
  application:
    name: restaurant-manager-backend-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurant_manager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${PORT:8080}

websocket:
  allowed-origin-patterns: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:19006}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

app:
  cache:
    redis-enabled: ${CACHE_REDIS_ENABLED:false}
    default-ttl-seconds: ${CACHE_DEFAULT_TTL_SECONDS:300}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:19006}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-requests: ${RATE_LIMIT_AUTH_REQUESTS:20}
    auth-window-seconds: ${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
    pin-requests: ${RATE_LIMIT_PIN_REQUESTS:5}
    pin-window-seconds: ${RATE_LIMIT_PIN_WINDOW_SECONDS:300}
    public-requests: ${RATE_LIMIT_PUBLIC_REQUESTS:120}
    public-window-seconds: ${RATE_LIMIT_PUBLIC_WINDOW_SECONDS:60}

security:
  jwt:
    secret: ${JWT_SECRET:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
    override-ttl-seconds: ${JWT_OVERRIDE_TTL_SECONDS:300}
  pin:
    max-failed-attempts: ${PIN_MAX_FAILED_ATTEMPTS:5}
    lockout-minutes: ${PIN_LOCKOUT_MINUTES:30}

payments:
  default-currency: ${PAYMENTS_DEFAULT_CURRENCY:GHS}
  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY:test_paystack_secret}
    base-url: ${PAYSTACK_BASE_URL:https://api.paystack.co}
  reconciliation:
    enabled: ${PAYMENTS_RECONCILIATION_ENABLED:true}
    pending-older-than-minutes: ${PAYMENTS_RECONCILIATION_PENDING_OLDER_THAN_MINUTES:15}
    batch-size: ${PAYMENTS_RECONCILIATION_BATCH_SIZE:200}
    fixed-delay-ms: ${PAYMENTS_RECONCILIATION_FIXED_DELAY_MS:60000}

logging:
  level:
    root: INFO
  pattern:
    level: "%5p [${spring.application.name:},trace=%X{traceId:-},span=%X{spanId:-}]"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
